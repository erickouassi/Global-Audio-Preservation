<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PingHost – All Audio Files</title>

  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #f7f7f7;
      margin: 0;
      padding: 20px;
      color: #333;
      line-height: 1.6;
    }
    h1 {
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 10px;
    }
    .home-link {
      display: inline-block;
      margin-bottom: 20px;
      padding: 8px 14px;
      background: #444;
      color: white;
      border-radius: 6px;
      text-decoration: none;
      font-size: 13px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 10px;
      overflow: hidden;
      font-size: 14px;
      margin-top: 20px;
    }
    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #eee;
      vertical-align: top;
    }
    th {
      background: #eaeaea;
      font-weight: 600;
    }
    .status-badge {
      padding: 4px 8px;
      border-radius: 6px;
      color: white;
      font-size: 12px;
      display: inline-block;
    }
    .btn {
      padding: 6px 10px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 12px;
    }
    .btn-ping {
      background: #0078ff;
      color: white;
    }
    .btn-reset {
      background: #c62828;
      color: white;
      margin-left: 6px;
    }
    footer {
      margin-top: 40px;
      padding-top: 20px;
      border-top: 1px solid #ddd;
      text-align: center;
      font-size: 14px;
      color: #666;
    }
    footer a {
      color: #0078ff;
      text-decoration: none;
    }
    @media (max-width: 600px) {
      td:nth-child(2), th:nth-child(2),
      td:nth-child(3), th:nth-child(3),
      td:nth-child(5), th:nth-child(5) {
        display: none;
      }
    }
  </style>
</head>
<body>

  <a href="index.html" class="home-link">← Back to Home</a>

  <h1>All Audio Files</h1>

  <table>
    <thead>
      <tr>
        <th>Title</th>
        <th>Note</th>
        <th>MP3</th>
        <th>Last Played</th>
        <th>Days Since</th>
        <th>Status</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="audioTableBody"></tbody>
  </table>

  <footer>
    <p>
      <a href="about.html">About</a> |
      <a href="privacy.html">Privacy</a> |
      <a href="#" id="shareLink">Tell A Friend →</a>
    </p>
    <p>© <span id="year"></span> | Made with 🙏🏽 by 
      <a href="https://erickouassi.com/" target="_blank">Eric</a>
    </p>
  </footer>

  <script src="script.js"></script>

  <script>
    function urgencyColor(urgency) {
      return {
        "healthy": "#4caf50",
        "warning": "#ff9800",
        "critical": "#f44336"
      }[urgency];
    }

    function renderTable(audios, states) {
      const tbody = document.getElementById("audioTableBody");
      tbody.innerHTML = "";

      const today = new Date();

      audios.forEach(audio => {
        const state = states[audio.id] || {};
        const last = state.lastPlayed ? new Date(state.lastPlayed) : null;

        const diff = last
          ? Math.floor((today - last) / (1000 * 60 * 60 * 24))
          : "Never";

        const urgency = getStatus(state.nextPing);
        const daysLeft = state.nextPing
          ? Math.floor((new Date(state.nextPing) - today) / (1000 * 60 * 60 * 24))
          : 0;

        const row = document.createElement("tr");

        row.innerHTML = `
          <td>
            <div>${audio.title}</div>
            <div style="font-size:11px;color:#666;margin-top:4px;">
              ${state.nextPing ? `Expires in ${daysLeft} days` : "No expiration set"}
            </div>
          </td>
          <td style="color:#666;">${audio.note || ""}</td>
          <td style="color:#0078ff; word-break:break-all;">${audio.mp3}</td>
          <td>${state.lastPlayed || "Never"}</td>
          <td>${diff}</td>
          <td>
            <span class="status-badge" style="background:${urgencyColor(urgency)};">
              ${urgency.toUpperCase()}
            </span>
          </td>
          <td>
            <button class="btn btn-ping">Ping Now</button>
            <button class="btn btn-reset">Reset</button>
          </td>
        `;

        const pingBtn = row.querySelector(".btn-ping");
        const resetBtn = row.querySelector(".btn-reset");

        pingBtn.onclick = async () => {
          try {
            await registerPlay(audio.id);
            const newState = await getState(audio.id);

            row.cells[3].textContent = newState.lastPlayed || "Never";

            const last = newState.lastPlayed ? new Date(newState.lastPlayed) : null;
            const diff = last
              ? Math.floor((today - last) / (1000 * 60 * 60 * 24))
              : "Never";

            row.cells[4].textContent = diff;

            const urgency = getStatus(newState.nextPing);
            const badge = row.cells[5].querySelector(".status-badge");
            badge.textContent = urgency.toUpperCase();
            badge.style.background = urgencyColor(urgency);
          } catch (e) {
            console.error("Ping failed:", e);
          }
        };

        resetBtn.onclick = async () => {
          const confirmReset = confirm(`Reset play count for "${audio.title}"?`);
          if (!confirmReset) return;

          try {
            await resetCount(audio.id);
            const newState = await getState(audio.id);

            row.cells[3].textContent = newState.lastPlayed || "Never";
            row.cells[4].textContent = "0";

            const urgency = getStatus(newState.nextPing);
            const badge = row.cells[5].querySelector(".status-badge");
            badge.textContent = urgency.toUpperCase();
            badge.style.background = urgencyColor(urgency);
          } catch (e) {
            console.error("Reset failed:", e);
          }
        };

        tbody.appendChild(row);
      });
    }

    async function initAllAudio() {
      const audios = await fetchJson("audio.json");
      const states = {};
      for (const audio of audios) {
        states[audio.id] = await getState(audio.id);
      }
      renderTable(audios, states);
      const yearEl = document.getElementById("year");
      if (yearEl) yearEl.textContent = new Date().getFullYear();
    }

    document.addEventListener("DOMContentLoaded", initAllAudio);
  </script>

</body>
</html>
